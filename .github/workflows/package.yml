name: Release Debian Package

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper devscripts dh-python

      - name: Build Package
        run: |
          # Build the package (unsigned source and changes)
          dpkg-buildpackage -us -uc -b
          # Publish a stable, version-less filename alongside the versioned
          # one so README links can use releases/latest/download/<name>.deb.
          cp ../dankweather-govee-monitor_*_all.deb ../dankweather-govee-monitor.deb

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ../dankweather-govee-monitor_*_all.deb
            ../dankweather-govee-monitor.deb
